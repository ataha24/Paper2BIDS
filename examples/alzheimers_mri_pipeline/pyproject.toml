[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "samba"
version = "0.1.0"
description = "Pipeline generated from code repository"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "nibabel",
    "nibabel>=4.0",
    "numpy",
    "pybids>=0.15",
    "snakebids>=0.10"
]

[project.scripts]
samba = "run:app.run"

[tool.hatch.build.targets.wheel]
packages = ["workflow"]
