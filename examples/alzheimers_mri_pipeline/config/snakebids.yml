# Nature Neuroscience - Snakebids Configuration
#
# Cannot determine - insufficient paper content provided
#
# Generated by Paper2BIDS
# Repository: https://github.com/andersonion/SAMBA
# =============================================================================
# BIDS Input Configuration
# =============================================================================

bids_dir: '/path/to/bids/dataset'

pybids_inputs:
  bold:
    filters:
      suffix: 'bold'
      extension: '.nii.gz'
      datatype: 'func'
    wildcards:
      - subject
      - session
      - task
      - run

# =============================================================================
# PyBIDS Caching (optional, speeds up repeated runs)
# =============================================================================

pybidsdb_dir: '.pybids_cache'
pybidsdb_reset: false

# =============================================================================
# BIDS App Configuration
# =============================================================================

analysis_levels:
  - participant

targets_by_analysis_level:
  participant:
    - ''  # Empty string targets the 'all' rule

# =============================================================================
# Command Line Arguments
# =============================================================================

parse_args:

# =============================================================================
# Pipeline Parameters
# =============================================================================

# create_identity_warp parameters
dtype: float64
timeout_s: 5.0

# create_centered_mass parameters
frac: 4

# create_identity_warp parameters
dtype: float64
timeout_s: 5.0
default_name: identity_warp
default_ext: .nii.gz

# skull_strip_brain parameters
bet_fractional_intensity: 0.3
bet_gradient: 0
bet_robust: True
bet_mask: True
use_ants: True

# test_input_orientation parameters
out_code: ALS
target_image: ${ATLAS_PATH}/chass_symmetric3/chass_symmetric3_DWI.nii.gz
downsample_factor: 8

# surfstat_vbm_analysis parameters
contrast: fa
fa_thresh: 0.27
group1_name: control
group2_name: treatment
input_dir: .
output_dir: results

# surfstat_vbm_analysis parameters
contrast: fa
group_1_name: control
group_2_name: treatment
inputs_directory: .
results_directory: results

# write_volumetric_image parameters
file_format: nii
slice_range: all
time_range: all
precision: float
voxel_size: auto
origin: auto

# strip_mask_brain_extraction parameters
dim_divisor: 1
threshold_zero: -2
num_morph: 5
radius: 2
debug: 0

# write_individual_stats parameters
runno: required
contrast_list: 'e1
project_id: ''
species: 'Rat'
spec_id: ''
atlas_id: 'xmas2015rat'
alphabetized: 1
excel_template: '/cm/shared/CIVMdata/CIVM_sills_rat_template.xlsx'
excel_range: 'E14:K39'

# write_individual_stats parameters
runno: ''
contrast_list: 'e1
project_id: ''
species: 'Rat'
spec_id: ''
atlas_id: 'xmas2015rat'
alphabetized: 1
excel_range: 'E14:K39'
image_dir: ''
output_dir: ''

# write_individual_label_stats parameters
contrast_list: 'dwi
space: 'native'
atlas_id: 'atlas'
use_first_contrast_to_mask: 1
image_dir: '{input_dir}/images'
output_dir: '{output_dir}/individual_label_statistics'

# extract_label_statistics parameters
runno: subject_id
contrast_list: "adc
space: "rigid"
atlas_id: "chass_symmetric2"
output_dir: output_directory

# antsr_voxel_based_analysis parameters
contrast: default_contrast
cluster_thresh_size: 200
lower_thresh: 0.8
upper_thresh: 1.0
control_name: control
treated_name: treated

# voxel_based_analysis parameters
dimensionality: 3
test_type: lm
formula: "response ~ diagnosis"
output_prefix: "./ANTsR"

# antsr_voxel_based_analysis parameters
contrast: default_contrast
control_name: control
treated_name: treated
cluster_thresh_size: 100
lower_thresh: 0.8
upper_thresh: 1.0

# antsr_voxel_based_analysis parameters
contrast: fa
cluster_thresh_size: 200
control_name: Control
treated_name: Phantoms

# =============================================================================
# Debug Mode
# =============================================================================

debug: false