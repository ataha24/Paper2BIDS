# # SAMBA - Snakebids Configuration
#
# Pipeline generated from code repository
#
# Generated by Paper2BIDS
# Repository: https://github.com/andersonion/SAMBA
# =============================================================================
# BIDS Input Configuration
# =============================================================================

bids_dir: '/path/to/bids/dataset'

pybids_inputs:

# =============================================================================
# PyBIDS Caching (optional, speeds up repeated runs)
# =============================================================================

pybidsdb_dir: '.pybids_cache'
pybidsdb_reset: false

# =============================================================================
# BIDS App Configuration
# =============================================================================

analysis_levels:
  - participant

targets_by_analysis_level:
  participant:
    - ''  # Empty string targets the 'all' rule

# =============================================================================
# Command Line Arguments
# =============================================================================

parse_args:

# =============================================================================
# Pipeline Parameters
# =============================================================================

# create_identity_warp parameters
dtype: float64
timeout_s: 5.0
output: None (optional output directory or filename)

# create_centered_mass parameters
frac: 4

# samba_benchmark_io parameters
reps: 3
no_pigz: False

# create_identity_warp parameters
dtype: float64
timeout_s: 5.0

# skullstrip_brain parameters
bet_fractional_intensity: 0.3
bet_gradient_threshold: 0
bet_robust: True
bet_mask: True
use_ants: True

# samba_pipeline_launcher parameters
SAMBA_CONTAINER_RUNTIME: auto
SAMBA_CONTAINER_PATH: auto
ATLAS_FOLDER_HOST: auto
BIGGUS_DISKUS: ${SCRATCH:-${WORK:-$HOME/samba_scratch}}
SAMBA_ATLAS_SEARCH_ROOTS: ""
optional_external_inputs_dir: ""

# orientation_manual_tester parameters
out_code: ALS
target_image: ${ATLAS_PATH}/chass_symmetric3/chass_symmetric3_DWI.nii.gz
downsample_factor: 8
work_dir_suffix: orientation_tester-work

# surfstat_vbm_analysis parameters
contrast: fa
fa_thresh: 0.27
group_1_name: control
group_2_name: phantom
surfstat_path: /home/rja20/cluster_code/workstation_code/analysis/vbm_pipe/surfstat/

# surfstat_vbm_analysis parameters
contrast: fa
group1_name: control
group2_name: treatment
inputs_dir: inputs
results_dir: results

# strip_mask parameters
dim_divisor: 1
threshold_zero: -2
num_morph: 5
radius: 2
debug: 0
output_suffix: "_8bit_mask"

# write_individual_label_stats parameters
runno: ''
contrast_list: 'e1
project_id: ''
species: 'Rat'
spec_id: ''
atlas_id: ''
alphabetized: 1
excel_range: 'E14:K39'
expected_output_subfolder: 'individual_label_statistics'

# individual_label_stats parameters
runno: ""
contrast_list: "e1
project_id: ""
species: "Rat"
spec_id: ""
atlas_id: "xmas2015rat"
alphabetized: 1
excel_range: "E14:K39"
excel_template: "/cm/shared/CIVMdata/CIVM_sills_rat_template.xlsx"

# write_individual_label_stats parameters
runno: ""
contrast_list: "dwi
image_dir: ""
output_dir: ""
space: "native"
atlas_id: ""
use_first_contrast_to_mask: 1
lookup_table_path: ""

# extract_label_statistics parameters
runno: subject_id
contrast_list: "adc
space: "rigid"
atlas_id: "chass_symmetric2"
output_dir: "stats"

# antsr_voxel_based_analysis parameters
contrast: default_contrast
control_name: control
treated_name: treated
cluster_thresh_size: 200
lower_thresh: 0.8
upper_thresh: 1.0

# simple_voxel_based_analysis parameters
dimensionality: 3
test_type: lm
formula: "response ~ diagnosis"
output_prefix: "./ANTsR"

# ants_voxel_based_analysis parameters
contrast: default_contrast
cluster_thresh_size: 100
lower_thresh: 0.8
upper_thresh: 1.0

# antsr_voxel_based_analysis parameters
contrast: fa
cluster_thresh_size: 200
control_name: Control
treated_name: Phantoms

# =============================================================================
# Debug Mode
# =============================================================================

debug: false